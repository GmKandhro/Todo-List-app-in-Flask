{% extends "base.html" %}

{% block content %}
    <h2>Edit Task</h2>
    <form action="{{ url_for('edit', id=task.id) }}" method="post">
        <input type="text" name="title" value="{{ task.title }}" required>
        <button type="submit">Update</button>
        <a href="{{ url_for('index') }}"><button type="button">Cancel</button></a>
    </form>
{% endblock %}
